name: Update Live Bank Rates

on:
  schedule:
    - cron: '0 20 * * *' # Runs daily at 20:00 UTC (6:00 AM Sydney time)
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write # Required to commit and push changes back

jobs:
  update-rates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run rates scraper
        run: python fetch_rates.py

      - name: Commit and push updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add current_rates.json
          # Only commit if there are changes to current_rates.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update live bank rates" && git push)
